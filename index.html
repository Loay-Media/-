<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>البيت السوري | The Syrian House</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="bg-animation"></div>

    <button id="cart-fab" class="cart-fab hidden" onclick="app.openCart()">
        <i class="fa-solid fa-cart-shopping"></i>
        <span id="cart-count">0</span>
    </button>

    <section id="welcome-screen" class="screen active">
        <div class="welcome-content 3d-tilt">
            <h1 class="logo-text">البيت السوري</h1>
            <p class="tagline">نورت البيت السوري يا فندم! أصل الطعم الشامي عندنا وبس.</p>
            <button class="btn-primary pulse" onclick="app.navigate('home')">
                <i class="fa-solid fa-utensils"></i> شوف المنيو
            </button>
        </div>
    </section>

    <section id="home-screen" class="screen hidden">
        <div class="header">
            <h2>اختار اللي نفسك فيه</h2>
        </div>
        <div id="categories-grid" class="grid-container">
            </div>
    </section>

    <section id="category-screen" class="screen hidden">
        <div class="header">
            <button class="btn-back" onclick="app.navigate('home')"><i class="fa-solid fa-arrow-right"></i> رجوع</button>
            <h2 id="category-title">الركن</h2>
        </div>
        <div id="items-grid" class="grid-container">
            </div>
    </section>

    <div id="cart-modal" class="modal-overlay hidden">
        <div class="modal-content glass-card">
            <button class="close-btn" onclick="app.closeCart()"><i class="fa-solid fa-xmark"></i></button>
            <h2>سلة الطلبات</h2>
            <div id="cart-items" class="cart-items-list">
                </div>
            <div class="cart-total">
                الإجمالي: <span id="total-price">0</span> ج.م
            </div>
            
            <form id="checkout-form" onsubmit="app.submitOrder(event)">
                <div class="input-group">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" placeholder="الاسم بالكامل" required>
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-phone"></i>
                    <input type="tel" placeholder="رقم الموبايل" required>
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" placeholder="الإيميل (اختياري)">
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-location-dot"></i>
                    <input type="text" placeholder="العنوان بالتفصيل" required>
                </div>
                
                <div class="payment-method">
                    <label>
                        <input type="radio" checked> 
                        <i class="fa-solid fa-money-bill-wave text-orange"></i> الدفع كاش عند الاستلام
                    </label>
                </div>
                
                <button type="submit" class="btn-primary w-100">تأكيد الطلب</button>
            </form>
        </div>
    </div>

    <div id="thank-you-popup" class="modal-overlay hidden">
        <div class="modal-content success-card scale-in">
            <div class="success-icon">
                <i class="fa-solid fa-check"></i>
            </div>
            <h2>ألف هنا!</h2>
            <p>طلبك اتأكد وهيوصلك في أسرع وقت. شكراً لاختيارك البيت السوري.</p>
            <button class="btn-primary" onclick="app.resetApp()">طلب جديد</button>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
